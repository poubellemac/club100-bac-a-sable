<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club 100 Reims</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --noir: #0F0F0F; --noir-soft: #1A1A1A;
    --or: #C9A84C; --or-light: #E8D5A0; --or-dark: #8A6820;
    --blanc: #F5F0E8; --gris-mid: #444;
    --border: rgba(201,168,76,0.3); --border-strong: rgba(201,168,76,0.6);
  }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--noir);
    color: var(--blanc);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem 4rem;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 65%);
  }
  .logo-img {
    width: 110px; height: auto;
    margin-bottom: 1.5rem;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
  }
  .club-name {
    font-family: 'Playfair Display', serif;
    color: var(--or);
    font-size: clamp(1.6rem, 6vw, 2.2rem);
    letter-spacing: 0.06em;
    text-align: center;
    margin-bottom: 0.4rem;
  }
  .club-sub {
    font-size: 12px;
    color: var(--or-light);
    opacity: 0.45;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .divider {
    width: 50px; height: 1px;
    background: linear-gradient(to right, transparent, var(--or), transparent);
    margin: 1.5rem auto 2.5rem;
  }
  .btn-principal {
    display: block;
    width: 100%; max-width: 320px;
    padding: 15px;
    background: var(--or);
    color: var(--noir);
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.07em; text-transform: uppercase;
    text-align: center; text-decoration: none;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    margin-bottom: 0.75rem;
  }
  .btn-principal:hover { background: var(--or-light); }
  .btn-principal:active { transform: scale(0.98); }
  .btn-secondaire {
    display: block;
    width: 100%; max-width: 320px;
    padding: 13px;
    background: transparent;
    color: var(--or-light);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 14px; font-weight: 700;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.07em; text-transform: uppercase;
    text-align: center; text-decoration: none;
    cursor: pointer;
    transition: border-color 0.18s, color 0.18s;
    margin-bottom: 0.75rem;
  }
  .btn-secondaire:hover { border-color: var(--or); color: var(--or); }
  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--or-light); opacity: 0.3;
    text-align: center; margin-bottom: 1rem;
  }
  .btn-admin {
    font-size: 11px; color: var(--or); opacity: 0.2;
    text-decoration: none; display: block;
    text-align: center; margin-top: 3rem;
    transition: opacity 0.2s;
  }
  .btn-admin:hover { opacity: 0.7; }
  .badge-bac {
    display: inline-block;
    font-size: 10px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    background: rgba(201,168,76,0.12);
    color: var(--or); border: 1px solid var(--border);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 1rem;
  }
</style>
</head>
