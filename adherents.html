<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhérents — Club 100 Reims</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --noir: #0F0F0F; --noir-soft: #1A1A1A;
    --or: #C9A84C; --or-light: #E8D5A0;
    --blanc: #F5F0E8;
    --border: rgba(201,168,76,0.3);
    --green: #2E6B3E;
  }
  body { font-family: 'Lato', sans-serif; background: var(--noir); color: var(--blanc); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 4rem; background-image: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 65%); }

  .header { width: 100%; max-width: 560px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .header-title { font-family: 'Playfair Display', serif; color: var(--or); font-size: 1.1rem; }
  .header-sub { font-size: 11px; color: var(--or-light); opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }
  .btn-retour { font-size: 12px; color: var(--or-light); opacity: 0.5; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-family: 'Lato', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; transition: opacity 0.2s; }
  .btn-retour:hover { opacity: 1; }

  .controls { width: 100%; max-width: 560px; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 10px; }
  .tri-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-tri { font-size: 11px; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: 'Lato', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; background: transparent; color: var(--or-light); border: 1px solid var(--border); transition: all 0.18s; }
  .btn-tri.active { background: rgba(201,168,76,0.15); border-color: var(--or); color: var(--or); }
  .search-input { width: 100%; padding: 10px 14px; font-size: 14px; font-family: 'Lato', sans-serif; border: 1px solid var(--border); border-radius: 8px; background: var(--noir); color: var(--blanc); outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--or); }
  .search-input::placeholder { color: rgba(245,240,232,0.25); }

  .stat-label { font-size: 11px; color: var(--or-light); opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

  .liste { background: var(--noir-soft); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.5rem; max-width: 560px; width: 100%; }
  .membre-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .membre-row:last-child { border-bottom: none; }
  .membre-nom { font-weight: 700; }
  .membre-detail { font-size: 11px; color: var(--or-light); opacity: 0.5; margin-top: 2px; }
  .contact-link { color: var(--or-light); text-decoration: none; border-bottom: 1px dotted var(--border); }
  .contact-link:hover { color: var(--or); border-bottom-color: var(--or); }
  .empty-msg { font-size: 13px; color: var(--or-light); opacity: 0.3; text-align: center; padding: 1.5rem 0; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Adhérents <span style="background:var(--or);color:#fff;padding:2px 8px;border-radius:6px;font-size:13px;font-weight:700;">v1.1</span></div>
    <div class="header-sub">Club 100 Reims</div>
  </div>
  <button class="btn-retour" onclick="window.location.href='admin.html'">← Retour</button>
</div>

<div class="controls">
  <div class="tri-bar">
    <button class="btn-tri active" id="tri-prenom" onclick="setTri('prenom')">A→Z Prénom</button>
    <button class="btn-tri" id="tri-nom" onclick="setTri('nom')">A→Z Nom</button>
    <button class="btn-tri" id="tri-date" onclick="setTri('date')">↑ Date</button>
  </div>
  <input class="search-input" type="text" id="search" placeholder="Rechercher par nom, prénom, téléphone, email…" oninput="afficher()" />
  <div class="stat-label" id="compteur">Chargement…</div>
</div>

<div class="liste" id="liste">
  <div class="empty-msg">Chargement…</div>
</div>

<script>
const SUPABASE_URL = "https://hepwtaxbnxnpmancrrxe.supabase.co";
const SUPABASE_KEY = "sb_publishable_0WjSlf9O9NTAmjeN9B-SEA_0o2Q5mD3";
let sb, tousAdherents = [], triCourant = 'prenom';

window.addEventListener('DOMContentLoaded', async () => {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data } = await sb.from('membres').select('prenom,nom,telephone,email,statut,date_inscription').eq('role','membre').order('prenom');
  tousAdherents = data || [];
  afficher();
});

function setTri(tri) {
  triCourant = tri;
  ['prenom','nom','date'].forEach(t => document.getElementById('tri-'+t).classList.toggle('active', t === tri));
  afficher();
}

function afficher() {
  const search = document.getElementById('search').value.toLowerCase();
  let liste = tousAdherents.filter(m =>
    (m.prenom+' '+m.nom).toLowerCase().includes(search) ||
    (m.telephone||'').includes(search) ||
    (m.email||'').toLowerCase().includes(search)
  );
  liste = [...liste].sort((a,b) => {
    if (triCourant === 'nom') return a.nom.localeCompare(b.nom);
    if (triCourant === 'date') return new Date(a.date_inscription) - new Date(b.date_inscription);
    return a.prenom.localeCompare(b.prenom);
  });
  document.getElementById('compteur').textContent = liste.length + " adhérent" + (liste.length > 1 ? "s" : "");
  const el = document.getElementById('liste');
  if (!liste.length) { el.innerHTML = '<div class="empty-msg">Aucun adhérent trouvé</div>'; return; }
  el.innerHTML = liste.map(m => {
    const tel = m.telephone
      ? `<a href="tel:${(m.telephone||'').replace(/\s/g,'')}" class="contact-link">${m.telephone}</a>`
      : "Pas de téléphone";
    const mail = m.email
      ? `<a href="mailto:${m.email}" class="contact-link">${m.email}</a>`
      : "Pas d'email";
    const statut = m.statut === "actif" ? "Actif" : "En attente";
    return `
    <div class="membre-row">
      <div>
        <div class="membre-nom">${m.prenom} ${m.nom}</div>
        <div class="membre-detail">${tel} · ${mail} · ${statut}</div>
      </div>
    </div>
  `;
  }).join('');
}
</script>
</body>
</html>
