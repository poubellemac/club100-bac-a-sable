<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club 100 — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --noir: #0F0F0F; --noir-soft: #1A1A1A;
    --or: #C9A84C; --or-light: #E8D5A0; --or-dark: #8A6820;
    --blanc: #F5F0E8; --gris-mid: #444;
    --border: rgba(201,168,76,0.3); --border-strong: rgba(201,168,76,0.6);
    --red: #8B1A1A;
  }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--noir);
    color: var(--blanc);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%);
  }
  .logo-img {
    width: 90px; height: auto;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 16px rgba(201,168,76,0.35));
  }
  .club-name {
    font-family: 'Playfair Display', serif;
    color: var(--or);
    font-size: 1.3rem;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
    text-align: center;
  }
  .club-sub {
    font-size: 11px;
    color: var(--or-light);
    opacity: 0.5;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    text-align: center;
  }
  .box {
    background: var(--noir-soft);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 1.75rem;
    width: 100%;
    max-width: 360px;
  }
  .box-title {
    font-family: 'Playfair Display', serif;
    color: var(--or);
    font-size: 1.1rem;
    text-align: center;
    margin-bottom: 1.75rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--or-light);
    opacity: 0.6;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 11px 14px;
    font-size: 15px;
    font-family: 'Lato', sans-serif;
    background: var(--noir);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--blanc);
    outline: none;
    margin-bottom: 1.25rem;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--or); }
  input::placeholder { color: rgba(245,240,232,0.2); }
  .btn {
    width: 100%;
    padding: 13px;
    background: var(--or);
    color: var(--noir);
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.18s, transform 0.1s;
    margin-top: 0.25rem;
  }
  .btn:hover { background: var(--or-light); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    font-size: 13px;
    color: #E57373;
    text-align: center;
    margin-bottom: 1rem;
    display: none;
    padding: 8px;
    background: rgba(139,26,26,0.1);
    border-radius: 6px;
  }
  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(to right, transparent, var(--or), transparent);
    margin: 0 auto 2rem;
  }
  .inscription-link {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    font-size: 12px;
    color: var(--or-light);
    opacity: 0.4;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .inscription-link:hover { opacity: 0.8; }
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(15,15,15,0.3);
    border-top-color: var(--noir);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<div class="club-name">Club 100 Les Centaures</div>
<div class="club-sub">Reims en Champagne</div>
<div class="divider"></div>

<div class="box">
  <div class="box-title">Espace Connexion</div>
  <div class="error" id="errorMsg">Identifiants incorrects.</div>
  <label for="loginInput">Identifiant</label>
  <input type="text" id="loginInput" placeholder="admin" autocomplete="username" />
  <label for="pwdInput">Mot de passe</label>
  <input type="password" id="pwdInput" placeholder="••••••••" autocomplete="current-password" />
  <button class="btn" id="loginBtn" onclick="doLogin()">
    <span id="btnText">Se connecter</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <a href="inscription_membre.html" class="inscription-link">Pas encore membre ? Faire une demande d'adhésion →</a>
</div>

<script>
const SUPABASE_URL = "https://hepwtaxbnxnpmancrrxe.supabase.co";
const SUPABASE_KEY = "sb_publishable_0WjSlf9O9NTAmjeN9B-SEA_0o2Q5mD3";
let sb;

window.addEventListener('DOMContentLoaded', () => {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  document.getElementById('pwdInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

async function doLogin() {
  const login = document.getElementById('loginInput').value.trim();
  const pwd   = document.getElementById('pwdInput').value.trim();
  const err   = document.getElementById('errorMsg');
  const btn   = document.getElementById('loginBtn');
  const txt   = document.getElementById('btnText');
  const spin  = document.getElementById('spinner');

  err.style.display = 'none';
  if (!login || !pwd) { err.textContent = 'Remplissez les deux champs.'; err.style.display = 'block'; return; }

  btn.disabled = true; txt.style.display = 'none'; spin.style.display = 'block';

  // Chercher le membre dans Supabase
  // Login = "Prénom Nom", mdp = prénom minuscules
  const { data, error } = await sb
    .from('membres')
    .select('*')
    .ilike('prenom', login)
    .ilike('nom', login)
    .eq('role', 'admin')
    .single();

  btn.disabled = false; txt.style.display = 'block'; spin.style.display = 'none';

  if (error || !data) {
    err.textContent = 'Identifiants incorrects.';
    err.style.display = 'block';
    return;
  }

  // Vérif mdp (insensible à la casse pour beta)
  if (data.mdp.toLowerCase() !== pwd.toLowerCase()) {
    err.textContent = 'Mot de passe incorrect.';
    err.style.display = 'block';
    return;
  }

  // Stocker session en sessionStorage
  sessionStorage.setItem('club100_user', JSON.stringify({
    id: data.id,
    prenom: data.prenom,
    nom: data.nom,
    role: data.role,
    statut: data.statut,
    cotisation: data.type_cotisation
  }));

  // Redirection selon rôle
  if (data.role === 'admin') {
    window.location.href = 'admin.html';
  } else {
    window.location.href = 'accueil_membre.html';
  }
}
</script>
